<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>My — 와이어프레임 탐색</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root {
    --ink: #2a2622;
    --ink-soft: #6b635b;
    --ink-faint: #b8afa6;
    --paper: #fbf7f1;
    --line: #2a2622;

    /* warm pastel accents */
    --peach: #f6c5a8;
    --rose: #efb6b6;
    --butter: #f5d985;
    --sage: #b9cdb0;
    --sky: #b3c9d9;
    --lilac: #cebed8;
  }
  html, body {
    margin: 0;
    background: #efe9df;
    font-family: 'Pretendard', sans-serif;
    color: var(--ink);
  }
  * { box-sizing: border-box; }

  /* -------- sketch primitives -------- */
  .sketch {
    background: var(--paper);
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 6px;
    position: relative;
  }
  .hand { font-family: 'Gaegu', 'Pretendard', sans-serif; }
  .scribble { font-family: 'Caveat', cursive; }

  .box {
    border: 1.5px solid var(--line);
    border-radius: 4px;
    background: #fff;
  }
  .box-dashed {
    border: 1.5px dashed var(--ink-soft);
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
  }
  .pill {
    border: 1.4px solid var(--line);
    border-radius: 999px;
    padding: 4px 12px;
    background: #fff;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .swatch {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid var(--line);
  }

  /* squiggle underline */
  .squig {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 6'><path d='M0 3 Q 5 0 10 3 T 20 3 T 30 3 T 40 3' fill='none' stroke='%232a2622' stroke-width='1.2'/></svg>");
    background-repeat: repeat-x;
    background-position: 0 100%;
    padding-bottom: 4px;
  }

  /* striped image placeholder */
  .img-ph {
    background: repeating-linear-gradient(
      135deg,
      #f0e8db 0 8px,
      #e6dccb 8px 16px
    );
    border: 1.5px solid var(--line);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-family: 'Gaegu', sans-serif;
    font-size: 13px;
  }

  /* generic text-line placeholder */
  .line-ph {
    height: 6px;
    background: var(--ink-faint);
    border-radius: 3px;
    opacity: 0.55;
  }
  .line-ph.short { width: 40%; }
  .line-ph.med   { width: 70%; }
  .line-ph.full  { width: 100%; }

  /* annotation arrow + text */
  .annot {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #c44;
    line-height: 1.1;
    pointer-events: none;
  }
  .annot svg { display: block; overflow: visible; }

  /* artboard inner padding helper */
  .pad { padding: 28px; }

  /* nav bar (top) */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1.5px solid var(--line);
    background: var(--paper);
  }
  .topnav .logo {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    font-weight: 700;
  }
  .topnav .menu {
    display: flex;
    gap: 18px;
    font-family: 'Gaegu', sans-serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .topnav .menu .active { color: var(--ink); border-bottom: 2px solid var(--ink); padding-bottom: 2px; }
  .topnav .right {
    display: flex; gap: 10px; align-items: center;
  }

  .icon-circ {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.4px solid var(--line);
    background: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  /* category card */
  .cat-card {
    aspect-ratio: 1.35 / 1;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: #fff;
    position: relative;
    overflow: hidden;
  }
  .cat-card .blob {
    position: absolute;
    width: 70px; height: 70px;
    border-radius: 50%;
    right: -14px; top: -14px;
    opacity: 0.85;
  }
  .cat-card .label {
    font-family: 'Gaegu', sans-serif;
    font-size: 16px;
  }
  .cat-card .count {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: var(--ink-soft);
  }

  /* search bar */
  .searchbar {
    display: flex; align-items: center; gap: 10px;
    border: 1.6px solid var(--line);
    border-radius: 999px;
    padding: 10px 18px;
    background: #fff;
  }
  .searchbar .placeholder {
    color: var(--ink-faint);
    font-family: 'Gaegu', sans-serif;
    font-size: 14px;
  }

  /* sidebar item */
  .side-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: 'Gaegu', sans-serif;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .side-item.active {
    background: var(--peach);
    color: var(--ink);
    border: 1.4px solid var(--line);
  }
  .side-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-faint);
    border: 1px solid var(--line);
  }

  /* tab */
  .tab {
    border: 1.4px solid var(--line);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 6px 14px;
    background: #fff;
    font-family: 'Gaegu', sans-serif;
    font-size: 13px;
  }
  .tab.active { background: var(--butter); }

  /* row item (list) */
  .row-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border: 1.4px solid var(--line);
    border-radius: 6px;
    background: #fff;
  }
  .row-item .dot { width:10px; height:10px; border-radius: 50%; border:1px solid var(--line); }

  /* design canvas tweaks */
  body {
    --canvas-bg: #efe9df;
  }
</style>
</head>
<body>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>

</body>
</html>
